<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion – Commandes Pâtisserie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .login-container {
      max-width: 360px; margin: 80px auto; padding: 24px;
      background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    .login-container h1 { margin: 0 0 12px; }
    .field { margin: 10px 0; }
    .field label { display:block; font-size:14px; margin-bottom:6px; }
    .input, select {
      width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:12px;
    }
    .btn { background:#1e293b; color:#fff; border:none; border-radius:14px; padding:12px 16px; width:100%; cursor:pointer; }
    .hint { font-size:12px; color:#6b7280; margin-top:8px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Connexion</h1>
    <p class="hint">Pas de mot de passe : entre un identifiant et choisis ton rôle.</p>

    <div class="field">
      <label for="identifier">Identifiant</label>
      <input id="identifier" class="input" placeholder="ex : admin, labo, sainteger" />
    </div>

    <div class="field">
      <label for="role">Rôle</label>
      <select id="role" class="input">
        <option value="boutique">Boutique</option>
        <option value="labo">Labo</option>
        <option value="admin">Admin</option>
        <option value="livreur">Livreur</option>
      </select>
    </div>

    <div id="boutiqueBlock" class="field">
      <label for="boutique_name">Nom de la boutique</label>
      <input id="boutique_name" class="input" placeholder="ex : Suresnes, Neuilly, Saint-Germain, Rueil" />
      <p class="hint">Si tu es boutique, renseigne le nom (utile pour les plans de livraison).</p>
    </div>

    <button id="loginBtn" class="btn">Se connecter</button>
    <div id="error" class="hint" style="color:#b91c1c; margin-top:10px;"></div>
  </div>

  <script src="js/common.js"></script>
  <script>
    // Affiche / masque le champ boutique selon le rôle
    const roleEl = document.getElementById('role');
    const boutiqueBlock = document.getElementById('boutiqueBlock');
    roleEl.addEventListener('change', () => {
      boutiqueBlock.classList.toggle('hidden', roleEl.value !== 'boutique');
    });

    // Au clic sur "Se connecter" :
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const identifier = document.getElementById('identifier').value.trim();
      const role = roleEl.value;
      const boutique_name = document.getElementById('boutique_name').value.trim();
      const errorBox = document.getElementById('error');
      errorBox.textContent = '';

      if (!identifier) {
        errorBox.textContent = 'Merci de saisir un identifiant.';
        return;
      }
      if (role === 'boutique' && !boutique_name) {
        errorBox.textContent = 'Merci d’indiquer le nom de la boutique.';
        return;
      }

      // 1) Tentative d’API /api/login si elle existe (sinon on passe en fallback)
      // Prépare la charge utile pour l'API : on envoie "username" et "identifier"
      const payload = {
        username: identifier,
        identifier,
        role,
        ...(role === 'boutique' && boutique_name ? { boutique_name } : {})
      };

      try {
        const resp = await apiRequest('/api/login', 'POST', payload);
        const backendUser = (resp && typeof resp === 'object') ? resp.user : null;
        const storedUser = backendUser ? {
          id: backendUser.id ?? identifier,
          role: backendUser.role ?? role,
          username: backendUser.username ?? identifier,
          boutique_id: backendUser.boutique_id ?? undefined,
          ...(role === 'boutique' ? { boutique_name } : {})
        } : {
          id: identifier,
          role,
          username: identifier,
          ...(role === 'boutique' ? { boutique_name } : {})
        };
        localStorage.setItem('user', JSON.stringify(storedUser));
      } catch (e) {
        // 2) Fallback local : pas d’endpoint /api/login nécessaire, le back lit juste X-User-Id
        const fallbackUser = {
          id: identifier,
          role,
          username: identifier,
          ...(role === 'boutique' ? { boutique_name } : {})
        };
        localStorage.setItem('user', JSON.stringify(fallbackUser));
      }

      // Redirection selon le rôle
      const to = (role === 'admin')
        ? 'admin.html'
        : (role === 'labo')
          ? 'labo.html'
          : (role === 'livreur')
            ? 'livreur.html'
            : 'boutique.html';
      window.location.href = to;
    });
  </script>
</body>
</html>
