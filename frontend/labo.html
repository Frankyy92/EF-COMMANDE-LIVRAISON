<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labo – Consolidation des commandes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="nav">
    <div class="nav-header">
      <h2>Labo</h2>
      <button type="button" class="nav-close" onclick="closeNav()" aria-label="Fermer le menu">×</button>
    </div>
    <a href="#" id="navConsolidation">Consolidation</a>
    <a href="#" id="navOrders">Commandes</a>
    <a href="#" id="navHistory">Historique</a>
    <a href="#" id="navDelivery">Livraison</a>
    <a href="#" id="navCategories">Catégories</a>
    <a href="#" id="navProducts">Produits</a>
    <a href="#" onclick="logout()" class="logout">Déconnexion</a>
  </div>
  <div class="nav-backdrop" onclick="closeNav()" aria-hidden="true"></div>
  <div class="main">
    <div class="topbar">
      <button type="button" class="hamburger" onclick="toggleNav()" aria-label="Ouvrir le menu">☰</button>
      <span class="menu-label">Menu</span>
      <button type="button" class="logout-top" onclick="logout()">Déconnexion</button>
    </div>
    <div id="content"></div>
  </div>
  <script src="js/common.js"></script>
  <script>
    (function() {
      const user = getUser();
      if (!user || (user.role !== 'labo' && user.role !== 'admin')) {
        window.location.href = 'index.html';
        return;
      }

      const content = document.getElementById('content');
      const escapeHtml = (str = '') => String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');

      const cache = {
        categories: null,
        products: null,
        boutiques: null
      };

      const getCategories = async () => {
        if (!cache.categories) {
          cache.categories = await apiRequest('/api/categories');
        }
        return cache.categories;
      };

      const getProducts = async () => {
        if (!cache.products) {
          cache.products = await apiRequest('/api/products');
        }
        return cache.products;
      };

      const getBoutiques = async () => {
        if (!cache.boutiques) {
          try {
            cache.boutiques = await apiRequest('/api/boutiques');
          } catch (err) {
            const message = err && err.message ? err.message : '';
            if (message.includes('404')) {
              console.warn('Endpoint /api/boutiques introuvable, utilisation d\'un tableau vide en secours.');
              cache.boutiques = [];
            } else {
              throw err;
            }
          }
        }
        return cache.boutiques;
      };

      const renderQtyControl = (key, value = 0, { allowNegative = false, attr = 'product' } = {}) => {
        const safeValue = Number.isFinite(value) ? value : parseInt(value, 10) || 0;
        const attrName = `data-${attr}`;
        const negativeAttr = allowNegative ? ' data-allow-negative="true"' : '';
        const minAttr = allowNegative ? '' : ' min="0"';
        return `
          <div class="qty-control" ${attrName}="${key}"${negativeAttr}>
            <button type="button" class="qty-btn minus" aria-label="Diminuer">&minus;</button>
            <input type="number" class="qty-input"${minAttr} inputmode="numeric" value="${safeValue}">
            <button type="button" class="qty-btn plus" aria-label="Augmenter">+</button>
          </div>
        `;
      };

      const bindQtyControls = (scope, { attr = 'product', allowNegative = false, onChange }) => {
        scope.querySelectorAll(`.qty-control[data-${attr}]`).forEach(control => {
          const key = parseInt(control.getAttribute(`data-${attr}`), 10);
          const input = control.querySelector('.qty-input');
          const minus = control.querySelector('.qty-btn.minus');
          const plus = control.querySelector('.qty-btn.plus');
          const allowNeg = allowNegative || control.getAttribute('data-allow-negative') === 'true';
          const commit = (val) => {
            let cleaned = parseInt(val, 10);
            if (Number.isNaN(cleaned)) cleaned = 0;
            if (!allowNeg && cleaned < 0) cleaned = 0;
            input.value = cleaned;
            if (typeof onChange === 'function') {
              onChange(key, cleaned);
            }
          };
          minus.addEventListener('click', () => {
            const current = parseInt(input.value, 10) || 0;
            commit(current - 1);
          });
          plus.addEventListener('click', () => {
            const current = parseInt(input.value, 10) || 0;
            commit(current + 1);
          });
          input.addEventListener('input', () => {
            commit(input.value);
          });
        });
      };

      document.getElementById('navConsolidation').addEventListener('click', (e) => {
        e.preventDefault();
        loadConsolidation();
      });
      document.getElementById('navOrders').addEventListener('click', (e) => {
        e.preventDefault();
        loadOrders();
      });
      document.getElementById('navHistory').addEventListener('click', (e) => {
        e.preventDefault();
        loadHistory();
      });
      document.getElementById('navDelivery').addEventListener('click', (e) => {
        e.preventDefault();
        loadDelivery();
      });
      document.getElementById('navCategories').addEventListener('click', (e) => {
        e.preventDefault();
        loadCategoriesManager();
      });
      document.getElementById('navProducts').addEventListener('click', (e) => {
        e.preventDefault();
        loadProductsManager();
      });

      async function loadCategoriesManager() {
        content.innerHTML = '<div class="header"><h1>Catégories</h1></div><p>Chargement...</p>';
        try {
          const categories = await apiRequest('/api/categories');
          cache.categories = categories;
          const render = (cats) => {
            let html = '<div class="header"><h1>Catégories</h1></div>';
            html += '<table><thead><tr><th>ID</th><th>Nom</th><th>Actions</th></tr></thead><tbody>';
            cats.forEach(cat => {
              html += `<tr data-id="${cat.id}"><td>${cat.id}</td><td>${escapeHtml(cat.name)}</td>`;
              html += `<td><div class="table-actions"><button data-id="${cat.id}" class="editCat">Modifier</button>`;
              html += `<button data-id="${cat.id}" class="delCat">Supprimer</button></div></td></tr>`;
            });
            html += '</tbody></table>';
            html += '<div class="card-form">';
            html += '<h3>Ajouter une catégorie</h3>';
            html += '<div class="form-line">';
            html += '<input type="text" id="newCatName" placeholder="Nom de la catégorie">';
            html += '<button id="addCatBtn">Ajouter</button>';
            html += '</div></div>';
            content.innerHTML = html;

            const refresh = () => loadCategoriesManager();

            const addBtn = document.getElementById('addCatBtn');
            if (addBtn) {
              addBtn.addEventListener('click', async () => {
                const nameField = document.getElementById('newCatName');
                const name = nameField.value.trim();
                if (!name) {
                  alert('Merci de saisir un nom.');
                  return;
                }
                try {
                  await apiRequest('/api/categories', 'POST', { name });
                  cache.categories = null;
                  cache.products = null;
                  refresh();
                } catch (err) {
                  alert(err.message);
                }
              });
            }

            content.querySelectorAll('.editCat').forEach(btn => {
              btn.addEventListener('click', () => {
                const id = parseInt(btn.getAttribute('data-id'), 10);
                const category = cats.find(c => c.id === id);
                if (!category) return;
                const row = btn.closest('tr');
                if (!row) return;
                row.innerHTML = `
                  <td>${category.id}</td>
                  <td><input type="text" class="catNameInput" value="${escapeHtml(category.name)}"></td>
                  <td>
                    <div class="table-actions">
                      <button class="saveCat">Enregistrer</button>
                      <button class="cancelCat">Annuler</button>
                    </div>
                  </td>`;
                const saveBtn = row.querySelector('.saveCat');
                const cancelBtn = row.querySelector('.cancelCat');
                if (saveBtn) {
                  saveBtn.addEventListener('click', async () => {
                    const newName = row.querySelector('.catNameInput').value.trim();
                    if (!newName) {
                      alert('Le nom ne peut pas être vide.');
                      return;
                    }
                    try {
                      await apiRequest(`/api/categories/${id}`, 'PUT', { name: newName });
                      cache.categories = null;
                      cache.products = null;
                      refresh();
                    } catch (err) {
                      alert(err.message);
                    }
                  });
                }
                if (cancelBtn) {
                  cancelBtn.addEventListener('click', refresh);
                }
              });
            });

            content.querySelectorAll('.delCat').forEach(btn => {
              btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (!confirm('Supprimer cette catégorie ?')) {
                  return;
                }
                try {
                  await apiRequest(`/api/categories/${id}`, 'DELETE');
                  cache.categories = null;
                  cache.products = null;
                  refresh();
                } catch (err) {
                  alert(err.message);
                }
              });
            });
          };

          render(categories);
        } catch (err) {
          const message = err && err.message ? err.message : 'Impossible de charger les catégories.';
          content.innerHTML = `<div class="header"><h1>Catégories</h1></div><p>Erreur: ${escapeHtml(message)}</p>`;
        }
      }

      async function loadProductsManager() {
        content.innerHTML = '<div class="header"><h1>Produits</h1></div><p>Chargement...</p>';
        let categories;
        try {
          categories = await apiRequest('/api/categories');
          cache.categories = categories;
        } catch (err) {
          const message = err && err.message ? err.message : 'Impossible de charger les catégories.';
          content.innerHTML = `<div class="header"><h1>Produits</h1></div><p>Erreur: ${escapeHtml(message)}</p>`;
          return;
        }

        const buildLayout = () => {
          let html = '<div class="header"><h1>Produits</h1></div>';
          html += '<div class="card-form">';
          html += '<div class="form-line" style="gap:12px; flex-wrap:wrap; display:flex; align-items:center;">';
          html += '<label for="filterCategory">Filtrer par catégorie :</label>';
          html += '<select id="filterCategory"><option value="">Toutes</option>';
          categories
            .slice()
            .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }))
            .forEach(cat => {
              html += `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`;
            });
          html += '</select>';
          html += '<button id="refreshProds">Afficher</button>';
          html += '</div>';
          html += '</div>';
          html += '<div id="prodTableContainer"></div>';
          html += '<div class="card-form" style="margin-top:24px;">';
          html += '<h3>Ajouter un produit</h3>';
          html += '<div class="form-line" style="display:flex; gap:12px; flex-wrap:wrap;">';
          html += '<input type="text" id="newProdName" placeholder="Nom du produit">';
          html += '<select id="newProdCat"><option value="">Catégorie</option>';
          categories.forEach(cat => {
            html += `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`;
          });
          html += '</select>';
          html += '<button id="addProdBtn">Ajouter</button>';
          html += '</div></div>';
          content.innerHTML = html;
        };

        buildLayout();

        const tableContainer = document.getElementById('prodTableContainer');
        const filterSelect = document.getElementById('filterCategory');
        const refreshBtn = document.getElementById('refreshProds');

        const loadList = async () => {
          const selectedCat = filterSelect.value;
          const endpoint = selectedCat ? `/api/products?category_id=${selectedCat}` : '/api/products';
          tableContainer.innerHTML = '<p>Chargement...</p>';
          try {
            const products = await apiRequest(endpoint);
            cache.products = selectedCat ? null : products;
            let table = '<table><thead><tr><th>ID</th><th>Nom</th><th>Catégorie</th><th>Actions</th></tr></thead><tbody>';
            products.forEach(prod => {
              const catName = categories.find(cat => cat.id === prod.category_id)?.name || '';
              table += `<tr data-id="${prod.id}"><td>${prod.id}</td><td>${escapeHtml(prod.name)}</td><td>${escapeHtml(catName)}</td>`;
              table += `<td><div class="table-actions"><button data-id="${prod.id}" class="editProd">Modifier</button>`;
              table += `<button data-id="${prod.id}" class="delProd">Supprimer</button></div></td></tr>`;
            });
            table += '</tbody></table>';
            tableContainer.innerHTML = table;

            tableContainer.querySelectorAll('.editProd').forEach(btn => {
              btn.addEventListener('click', () => {
                const id = parseInt(btn.getAttribute('data-id'), 10);
                const row = btn.closest('tr');
                if (!row) return;
                const product = products.find(p => p.id === id);
                if (!product) return;
                const options = categories.map(cat => `
                  <option value="${cat.id}" ${cat.id === product.category_id ? 'selected' : ''}>${escapeHtml(cat.name)}</option>
                `).join('');
                row.innerHTML = `
                  <td>${product.id}</td>
                  <td><input type="text" class="prodNameInput" value="${escapeHtml(product.name)}"></td>
                  <td><select class="prodCatSelect">${options}</select></td>
                  <td>
                    <div class="table-actions">
                      <button class="saveProd">Enregistrer</button>
                      <button class="cancelProd">Annuler</button>
                    </div>
                  </td>`;
                const saveBtn = row.querySelector('.saveProd');
                const cancelBtn = row.querySelector('.cancelProd');
                if (saveBtn) {
                  saveBtn.addEventListener('click', async () => {
                    const newName = row.querySelector('.prodNameInput').value.trim();
                    const newCatId = parseInt(row.querySelector('.prodCatSelect').value, 10);
                    if (!newName || !newCatId) {
                      alert('Le nom et la catégorie sont obligatoires.');
                      return;
                    }
                    try {
                      await apiRequest(`/api/products/${id}`, 'PUT', { name: newName, category_id: newCatId });
                      cache.products = null;
                      await loadList();
                    } catch (err) {
                      alert(err.message);
                    }
                  });
                }
                if (cancelBtn) {
                  cancelBtn.addEventListener('click', () => {
                    loadList();
                  });
                }
              });
            });

            tableContainer.querySelectorAll('.delProd').forEach(btn => {
              btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (!confirm('Supprimer ce produit ?')) {
                  return;
                }
                try {
                  await apiRequest(`/api/products/${id}`, 'DELETE');
                  cache.products = null;
                  await loadList();
                } catch (err) {
                  alert(err.message);
                }
              });
            });
          } catch (err) {
            tableContainer.innerHTML = `<p>Erreur: ${escapeHtml(err.message || 'Impossible de charger les produits.')}</p>`;
          }
        };

        if (refreshBtn) {
          refreshBtn.addEventListener('click', loadList);
        }

        const addBtn = document.getElementById('addProdBtn');
        if (addBtn) {
          addBtn.addEventListener('click', async () => {
            const nameInput = document.getElementById('newProdName');
            const catSelect = document.getElementById('newProdCat');
            const name = nameInput.value.trim();
            const categoryId = parseInt(catSelect.value, 10);
            if (!name || !categoryId) {
              alert('Merci de renseigner le nom et la catégorie.');
              return;
            }
            try {
              await apiRequest('/api/products', 'POST', { name, category_id: categoryId });
              cache.products = null;
              nameInput.value = '';
              catSelect.value = '';
              await loadList();
            } catch (err) {
              alert(err.message);
            }
          });
        }

        loadList();
      }

      async function loadConsolidation() {
        content.innerHTML = '<div class="header"><h1>Consolidation</h1></div><p>Chargement...</p>';
        let categories;
        let products;
        let boutiques;
        try {
          [categories, products, boutiques] = await Promise.all([
            getCategories(),
            getProducts(),
            getBoutiques()
          ]);
        } catch (err) {
          const message = err && err.message ? err.message : 'Impossible de récupérer les données.';
          content.innerHTML = `<div class="header"><h1>Consolidation</h1></div><p>Erreur: ${escapeHtml(message)}</p>`;
          return;
        }
        let selectedDate = getTomorrow();
        let adjustments = {};

        let html = '<div class="header"><h1>Consolidation</h1></div>';
        html += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">';
        html += '<label for="consoDate">Date :</label>';
        html += `<input type="date" id="consoDate" value="${selectedDate}">`;
        html += '<button id="refreshConso">Afficher</button>';
        html += '</div>';
        html += '<div class="consolidation-actions"><button class="validate-consolidation">Valider la consolidation</button></div>';
        html += '<div id="consolidationTable"></div>';
        html += '<div class="consolidation-actions"><button class="validate-consolidation">Valider la consolidation</button></div>';
        content.innerHTML = html;

        const tableContainer = document.getElementById('consolidationTable');
        const dateInput = document.getElementById('consoDate');

        const renderTable = async (date, resetAdjustments = true) => {
          if (!date) {
            tableContainer.innerHTML = '<p>Merci de sélectionner une date.</p>';
            return;
          }
          tableContainer.innerHTML = '<p>Chargement...</p>';
          try {
            const orders = await apiRequest(`/api/orders?date=${date}`);
            if (resetAdjustments) {
              adjustments = {};
            }
            if (!orders.length) {
              tableContainer.innerHTML = '<p>Aucune commande pour cette date.</p>';
              return;
            }
            const boutiqueLookup = new Map(boutiques.map(b => [b.id, b]));
            const boutiqueColumnsMap = new Map();
            orders.forEach(order => {
              const name = order.boutique_name || boutiqueLookup.get(order.boutique_id)?.name || `Boutique #${order.boutique_id}`;
              boutiqueColumnsMap.set(order.boutique_id, { id: order.boutique_id, name });
            });
            const boutiqueColumns = Array.from(boutiqueColumnsMap.values())
              .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
            const aggregate = new Map();
            products.forEach(prod => {
              aggregate.set(prod.id, { total: 0, perBoutique: new Map() });
            });
            orders.forEach(order => {
              order.items.forEach(item => {
                const entry = aggregate.get(item.product_id);
                if (!entry) return;
                const current = entry.perBoutique.get(order.boutique_id) || 0;
                entry.perBoutique.set(order.boutique_id, current + item.quantity);
                entry.total += item.quantity;
              });
            });
            const columnCount = boutiqueColumns.length + 3;
            let table = '<table><thead><tr><th>Produit</th>';
            boutiqueColumns.forEach(boutique => {
              table += `<th>${escapeHtml(boutique.name)}</th>`;
            });
            table += '<th>Total</th><th>Ajustement</th></tr></thead><tbody>';
            categories.forEach(category => {
              const prods = products.filter(prod => prod.category_id === category.id)
                .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
              if (!prods.length) {
                return;
              }
              table += `<tr class="category-row"><td colspan="${columnCount}">${escapeHtml(category.name)}</td></tr>`;
              prods.forEach(prod => {
                const metrics = aggregate.get(prod.id) || { total: 0, perBoutique: new Map() };
                const currentAdjustment = adjustments[prod.id] ?? 0;
                const baseTotal = metrics.total || 0;
                const adjustedTotal = baseTotal + currentAdjustment;
                table += `<tr data-product="${prod.id}"><td>${escapeHtml(prod.name)}</td>`;
                boutiqueColumns.forEach(boutique => {
                  const qty = metrics.perBoutique.get(boutique.id) || 0;
                  table += `<td>${qty}</td>`;
                });
                table += `<td class="total-cell" data-product="${prod.id}" data-base="${baseTotal}">${adjustedTotal}</td>`;
                table += `<td>${renderQtyControl(prod.id, currentAdjustment, { allowNegative: true, attr: 'adjust' })}</td></tr>`;
              });
            });
            table += '</tbody></table>';
            tableContainer.innerHTML = table;
            bindQtyControls(tableContainer, {
              attr: 'adjust',
              allowNegative: true,
              onChange: (productId, value) => {
                if (value === 0) {
                  delete adjustments[productId];
                } else {
                  adjustments[productId] = value;
                }
                const totalCell = tableContainer.querySelector(`.total-cell[data-product="${productId}"]`);
                if (totalCell) {
                  const base = parseInt(totalCell.getAttribute('data-base'), 10) || 0;
                  totalCell.textContent = base + value;
                }
              }
            });
          } catch (err) {
            tableContainer.innerHTML = `<p>Erreur: ${escapeHtml(err.message)}</p>`;
          }
        };

        document.getElementById('refreshConso').addEventListener('click', () => {
          selectedDate = dateInput.value;
          renderTable(selectedDate, true);
        });

        content.querySelectorAll('.validate-consolidation').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!selectedDate) {
              alert('Veuillez sélectionner une date.');
              return;
            }
            const payload = {};
            Object.entries(adjustments).forEach(([productId, value]) => {
              if (value !== 0) {
                payload[productId] = value;
              }
            });
            try {
              await apiRequest('/api/labo/consolidation/validate', 'POST', {
                date: selectedDate,
                adjustments: payload
              });
              alert('Consolidation validée');
              renderTable(selectedDate, true);
            } catch (err) {
              alert(err.message);
            }
          });
        });

        renderTable(selectedDate, true);
      }

      async function loadOrders() {
        content.innerHTML = '<div class="header"><h1>Commandes</h1></div><p>Chargement...</p>';
        let boutiques;
        let products;
        try {
          [boutiques, products] = await Promise.all([
            getBoutiques(),
            getProducts()
          ]);
        } catch (err) {
          const message = err && err.message ? err.message : 'Impossible de récupérer les données.';
          content.innerHTML = `<div class="header"><h1>Commandes</h1></div><p>Erreur: ${escapeHtml(message)}</p>`;
          return;
        }
        const boutiqueMap = new Map(boutiques.map(b => [b.id, b.name]));
        let selectedDate = getTomorrow();

        let html = '<div class="header"><h1>Commandes</h1></div>';
        html += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">';
        html += '<label for="ordersDate">Date :</label>';
        html += `<input type="date" id="ordersDate" value="${selectedDate}">`;
        html += '<label for="ordersBoutique">Boutique :</label>';
        html += '<select id="ordersBoutique"><option value="">Toutes</option>';
        boutiques
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }))
          .forEach(boutique => {
            html += `<option value="${boutique.id}">${escapeHtml(boutique.name)}</option>`;
          });
        html += '</select>';
        html += '<button id="refreshOrders">Afficher</button>';
        html += '</div>';
        html += '<div id="ordersTable"></div>';
        html += '<div id="orderDetails" class="details-panel hidden"></div>';
        content.innerHTML = html;

        const tableContainer = document.getElementById('ordersTable');
        const detailBox = document.getElementById('orderDetails');

        const renderOrders = (orders) => {
          if (!orders.length) {
            tableContainer.innerHTML = '<p>Aucune commande pour les critères sélectionnés.</p>';
            detailBox.classList.add('hidden');
            detailBox.innerHTML = '';
            return;
          }
          let table = '<table><thead><tr><th>Boutique</th><th>Détails</th><th>Actions</th></tr></thead><tbody>';
          orders.forEach(order => {
            const name = order.boutique_name || boutiqueMap.get(order.boutique_id) || `Boutique #${order.boutique_id}`;
            table += `<tr data-id="${order.id}"><td>${escapeHtml(name)}</td><td><button class="viewOrder" data-id="${order.id}">Voir</button></td>`;
            table += '<td><div class="table-actions">';
            table += `<button class="editOrder" data-id="${order.id}">Modifier</button>`;
            if (order.status !== 'validated') {
              table += `<button class="finalizeOrder" data-id="${order.id}">Valider</button>`;
            }
            table += '</div></td></tr>';
          });
          table += '</tbody></table>';
          tableContainer.innerHTML = table;

          const showOrderDetails = (order) => {
            const name = order.boutique_name || boutiqueMap.get(order.boutique_id) || `Boutique #${order.boutique_id}`;
            let detailHtml = `<h3>${escapeHtml(name)} – commande du ${escapeHtml(order.date)}</h3>`;
            detailHtml += `<p class="subtle-text">Statut : ${escapeHtml(order.status)}</p>`;
            if (!order.items.length) {
              detailHtml += '<p>Aucun produit.</p>';
            } else {
              detailHtml += '<table><thead><tr><th>Produit</th><th>Quantité</th></tr></thead><tbody>';
              order.items.forEach(item => {
                const productLabel = item.product_name || products.find(p => p.id === item.product_id)?.name || `Produit #${item.product_id}`;
                detailHtml += `<tr><td>${escapeHtml(productLabel)}</td><td>${item.quantity}</td></tr>`;
              });
              detailHtml += '</tbody></table>';
            }
            detailBox.innerHTML = detailHtml;
            detailBox.classList.remove('hidden');
          };

          const showOrderEditor = (order) => {
            const editQuantities = {};
            order.items.forEach(item => {
              editQuantities[item.product_id] = item.quantity;
            });
            const name = order.boutique_name || boutiqueMap.get(order.boutique_id) || `Boutique #${order.boutique_id}`;
            let editor = `<h3>Modifier la commande – ${escapeHtml(name)}</h3>`;
            editor += `<p class="subtle-text">${escapeHtml(order.date)}</p>`;
            if (!order.items.length) {
              editor += '<p>Aucun produit à modifier.</p>';
            } else {
              editor += '<form id="orderEditForm">';
              editor += '<table><thead><tr><th>Produit</th><th>Quantité</th></tr></thead><tbody>';
              order.items.forEach(item => {
                const productLabel = item.product_name || products.find(p => p.id === item.product_id)?.name || `Produit #${item.product_id}`;
                editor += `<tr><td>${escapeHtml(productLabel)}</td><td>${renderQtyControl(item.product_id, item.quantity)}</td></tr>`;
              });
              editor += '</tbody></table>';
              editor += '<div class="consolidation-actions"><button type="submit">Enregistrer</button><button type="button" id="cancelEdit">Annuler</button></div>';
              editor += '</form>';
            }
            detailBox.innerHTML = editor;
            detailBox.classList.remove('hidden');
            const form = detailBox.querySelector('#orderEditForm');
            if (form) {
              bindQtyControls(form, {
                onChange: (productId, value) => {
                  if (value <= 0) {
                    delete editQuantities[productId];
                  } else {
                    editQuantities[productId] = value;
                  }
                }
              });
              form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const items = Object.entries(editQuantities).map(([productId, quantity]) => ({
                  product_id: parseInt(productId, 10),
                  quantity: parseInt(quantity, 10) || 0
                })).filter(item => item.quantity > 0);
                try {
                  await apiRequest(`/api/orders/${order.id}`, 'PUT', { items });
                  alert('Commande mise à jour');
                  await fetchOrders();
                } catch (err) {
                  alert(err.message);
                }
              });
              const cancelBtn = detailBox.querySelector('#cancelEdit');
              if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                  detailBox.classList.add('hidden');
                  detailBox.innerHTML = '';
                });
              }
            }
          };

          tableContainer.querySelectorAll('.viewOrder').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = parseInt(btn.getAttribute('data-id'), 10);
              const order = orders.find(o => o.id === id);
              if (order) {
                showOrderDetails(order);
              }
            });
          });

          tableContainer.querySelectorAll('.editOrder').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = parseInt(btn.getAttribute('data-id'), 10);
              const order = orders.find(o => o.id === id);
              if (order) {
                showOrderEditor(order);
              }
            });
          });

          tableContainer.querySelectorAll('.finalizeOrder').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = parseInt(btn.getAttribute('data-id'), 10);
              if (!id) return;
              if (!confirm('Valider cette commande ?')) return;
              try {
                await apiRequest(`/api/orders/${id}/finalize`, 'POST');
                await fetchOrders();
              } catch (err) {
                alert(err.message);
              }
            });
          });
        };

        const fetchOrders = async () => {
          const params = new URLSearchParams();
          selectedDate = document.getElementById('ordersDate').value;
          const boutiqueFilter = document.getElementById('ordersBoutique').value;
          if (selectedDate) {
            params.set('date', selectedDate);
          }
          if (boutiqueFilter) {
            params.set('boutique_id', boutiqueFilter);
          }
          tableContainer.innerHTML = '<p>Chargement...</p>';
          try {
            const query = params.toString();
            const endpoint = query ? `/api/orders?${query}` : '/api/orders';
            const orders = await apiRequest(endpoint);
            renderOrders(orders);
          } catch (err) {
            tableContainer.innerHTML = `<p>Erreur: ${escapeHtml(err.message)}</p>`;
          }
        };

        document.getElementById('refreshOrders').addEventListener('click', fetchOrders);
        fetchOrders();
      }

      async function loadHistory() {
        content.innerHTML = '<div class="header"><h1>Historique</h1></div><p>Chargement...</p>';
        let boutiques;
        try {
          boutiques = await getBoutiques();
        } catch (err) {
          const message = err && err.message ? err.message : 'Impossible de récupérer les données.';
          content.innerHTML = `<div class="header"><h1>Historique</h1></div><p>Erreur: ${escapeHtml(message)}</p>`;
          return;
        }
        let startDate = getToday();
        let endDate = getToday();

        let html = '<div class="header"><h1>Historique</h1></div>';
        html += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">';
        html += '<label for="historyStart">Du :</label>';
        html += `<input type="date" id="historyStart" value="${startDate}">`;
        html += '<label for="historyEnd">Au :</label>';
        html += `<input type="date" id="historyEnd" value="${endDate}">`;
        html += '<label for="historyBoutique">Boutique :</label>';
        html += '<select id="historyBoutique"><option value="">Toutes</option>';
        boutiques
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }))
          .forEach(boutique => {
            html += `<option value="${boutique.id}">${escapeHtml(boutique.name)}</option>`;
          });
        html += '</select>';
        html += '<button id="refreshHistory">Afficher</button>';
        html += '</div>';
        html += '<div id="historyResults"></div>';
        html += '<div id="historyDetails" class="details-panel hidden"></div>';
        content.innerHTML = html;

        const resultsContainer = document.getElementById('historyResults');
        const detailBox = document.getElementById('historyDetails');

        const renderHistory = (orders) => {
          if (!orders.length) {
            resultsContainer.innerHTML = '<p>Aucune commande trouvée.</p>';
            detailBox.classList.add('hidden');
            detailBox.innerHTML = '';
            return;
          }
          const dataset = orders.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
          let table = '<table><thead><tr><th>Date</th><th>Boutique</th><th>Statut</th><th>Détails</th></tr></thead><tbody>';
          dataset.forEach(order => {
            const name = order.boutique_name || boutiques.find(b => b.id === order.boutique_id)?.name || `Boutique #${order.boutique_id}`;
            table += `<tr><td>${escapeHtml(order.date)}</td><td>${escapeHtml(name)}</td><td>${escapeHtml(order.status)}</td><td><button class="viewHistory" data-id="${order.id}">Voir</button></td></tr>`;
          });
          table += '</tbody></table>';
          resultsContainer.innerHTML = table;

          resultsContainer.querySelectorAll('.viewHistory').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = parseInt(btn.getAttribute('data-id'), 10);
              const order = dataset.find(o => o.id === id);
              if (!order) return;
              const name = order.boutique_name || boutiques.find(b => b.id === order.boutique_id)?.name || `Boutique #${order.boutique_id}`;
              let detailHtml = `<h3>${escapeHtml(name)} – ${escapeHtml(order.date)}</h3>`;
              detailHtml += `<p class="subtle-text">Statut : ${escapeHtml(order.status)}</p>`;
              if (!order.items.length) {
                detailHtml += '<p>Aucun produit.</p>';
              } else {
                detailHtml += '<table><thead><tr><th>Produit</th><th>Quantité</th></tr></thead><tbody>';
                order.items.forEach(item => {
                  const productLabel = item.product_name || `Produit #${item.product_id}`;
                  detailHtml += `<tr><td>${escapeHtml(productLabel)}</td><td>${item.quantity}</td></tr>`;
                });
                detailHtml += '</tbody></table>';
              }
              detailBox.innerHTML = detailHtml;
              detailBox.classList.remove('hidden');
            });
          });
        };

        const fetchHistory = async () => {
          const params = new URLSearchParams();
          startDate = document.getElementById('historyStart').value;
          endDate = document.getElementById('historyEnd').value;
          const boutiqueFilter = document.getElementById('historyBoutique').value;
          if (startDate) params.set('start_date', startDate);
          if (endDate) params.set('end_date', endDate);
          if (boutiqueFilter) params.set('boutique_id', boutiqueFilter);
          resultsContainer.innerHTML = '<p>Chargement...</p>';
          try {
            const query = params.toString();
            const endpoint = query ? `/api/orders?${query}` : '/api/orders';
            const orders = await apiRequest(endpoint);
            renderHistory(orders);
          } catch (err) {
            resultsContainer.innerHTML = `<p>Erreur: ${escapeHtml(err.message)}</p>`;
          }
        };

        document.getElementById('refreshHistory').addEventListener('click', fetchHistory);
        fetchHistory();
      }

      async function loadDelivery() {
        let selectedDate = getTomorrow();
        let html = '<div class="header"><h1>Livraison</h1></div>';
        html += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">';
        html += '<label for="deliveryDate">Date :</label>';
        html += `<input type="date" id="deliveryDate" value="${selectedDate}">`;
        html += '<button id="refreshDelivery">Afficher</button>';
        html += '</div>';
        html += '<div id="deliveryTable"></div>';
        html += '<div id="deliveryDetails" class="details-panel hidden"></div>';
        content.innerHTML = html;

        const tableContainer = document.getElementById('deliveryTable');
        const detailBox = document.getElementById('deliveryDetails');

        const renderDelivery = (orders, date) => {
          if (!orders.length) {
            tableContainer.innerHTML = '<p>Aucune commande pour cette date.</p>';
            detailBox.classList.add('hidden');
            detailBox.innerHTML = '';
            return;
          }
          let table = '<table><thead><tr><th>Boutique</th><th>Quantité</th><th>Actions</th></tr></thead><tbody>';
          orders.forEach(order => {
            const totalQty = order.items.reduce((sum, item) => sum + item.quantity, 0);
            const name = order.boutique_name || `Boutique #${order.boutique_id}`;
            table += `<tr data-order="${order.order_id}"><td>${escapeHtml(name)}</td><td>${totalQty}</td>`;
            table += '<td><div class="table-actions">';
            table += `<button class="viewDelivery" data-id="${order.order_id}">Afficher</button>`;
            table += `<button class="icon-button printDelivery" data-date="${date}" data-boutique="${order.boutique_id || ''}" title="Imprimer">🖨️</button>`;
            table += '</div></td></tr>';
          });
          table += '</tbody></table>';
          tableContainer.innerHTML = table;

          const showDetail = (order) => {
            const name = order.boutique_name || `Boutique #${order.boutique_id}`;
            let detailHtml = `<h3>${escapeHtml(name)} – ${escapeHtml(date)}</h3>`;
            detailHtml += `<p class="subtle-text">Statut : ${escapeHtml(order.status)}</p>`;
            if (!order.items.length) {
              detailHtml += '<p>Aucun produit.</p>';
            } else {
              detailHtml += '<table><thead><tr><th>Produit</th><th>Quantité</th></tr></thead><tbody>';
              order.items.forEach(item => {
                detailHtml += `<tr><td>${escapeHtml(item.product_name)}</td><td>${item.quantity}</td></tr>`;
              });
              detailHtml += '</tbody></table>';
            }
            detailBox.innerHTML = detailHtml;
            detailBox.classList.remove('hidden');
          };

          tableContainer.querySelectorAll('.viewDelivery').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = parseInt(btn.getAttribute('data-id'), 10);
              const order = orders.find(o => o.order_id === id);
              if (order) {
                showDetail(order);
              }
            });
          });

          tableContainer.querySelectorAll('.printDelivery').forEach(btn => {
            btn.addEventListener('click', () => {
              const dateValue = btn.getAttribute('data-date');
              const boutiqueId = btn.getAttribute('data-boutique');
              let url = `/api/labo/pdf/${dateValue}?type=delivery`;
              if (boutiqueId) {
                url += `&boutique_id=${boutiqueId}`;
              }
              window.open(apiUrl(url), '_blank');
            });
          });
        };

        const fetchDelivery = async () => {
          selectedDate = document.getElementById('deliveryDate').value;
          if (!selectedDate) {
            tableContainer.innerHTML = '<p>Merci de choisir une date.</p>';
            return;
          }
          tableContainer.innerHTML = '<p>Chargement...</p>';
          try {
            const orders = await apiRequest(`/api/labo/delivery/${selectedDate}`);
            renderDelivery(orders, selectedDate);
          } catch (err) {
            tableContainer.innerHTML = `<p>Erreur: ${escapeHtml(err.message)}</p>`;
          }
        };

        document.getElementById('refreshDelivery').addEventListener('click', fetchDelivery);
        fetchDelivery();
      }

      loadConsolidation();
    })();
  </script>
</body>
